<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Track</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon-light.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/svg+xml" href="/static/favicon-dark.svg" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
<div class="container">
    <h1>Trip Track</h1>

    <section class="create-trip">
        <h2>New Trip</h2>
        <form method="POST" action="/trips">
            <input type="text" name="name" placeholder="Trip name, e.g. Balkans 2026" required>
            <button type="submit">Create Trip</button>
        </form>
    </section>

    {{if .Trips}}
    <section class="trip-list">
        <h2>Your Trips</h2>
        {{range .Trips}}
        <div class="trip-card">
            <a href="/admin/{{.AdminToken}}">
                <h3>{{.Name}}</h3>
                <span class="date">{{.CreatedAt}}</span>
            </a>
        </div>
        {{end}}
    </section>
    {{end}}
</div>
</body>
</html>
